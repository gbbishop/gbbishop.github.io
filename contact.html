<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Fight Club Fitness</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="contact-page">

<!-- HEADER -->
<header>
    <div class="logo">
<a href="index.html">
    <img src="images/logo.jpg" alt="Fight Club Fitness Logo" class="logo">
</a>        <span>Fight Club Fitness</span>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="signup.html">Register</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- HERO -->
<section class="sub-hero">
    <h1>Contact Us</h1>
</section>

<!-- CONTACT SECTION -->
<section class="contact-section">

    <div class="contact-container">

        <!-- CONTACT INFO -->
        <div class="contact-info">
            <h2>Get In Touch</h2>
            <p><strong>Phone:</strong> (868) 720-8814</p>
            <p><strong>Email:</strong> fightclubfitness@gmail.com.com</p>
            <p><strong>Location:</strong> #2 Avacardo Drive, Santa Rosa Heights, Arima Trinidad</p>
        </div>

        <!-- CONTACT FORM -->
        <form id="contactForm">

            <h2>Send a Message</h2>

            <input type="text" id="contactName" placeholder="Name">
            <input type="email" id="contactEmail" placeholder="Email">
            <textarea id="message" placeholder="Your Message"></textarea>

            <button type="submit" class="join-btn">Send Message</button>

            <p id="contactMsg"></p>

        </form>

    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Fight Club Fitness Studio</p>
</footer>

<script>

/* CONTACT FORM VALIDATION */

document.getElementById("contactForm").addEventListener("submit", function(e){

    e.preventDefault();

    let name = document.getElementById("contactName").value.trim();
    let email = document.getElementById("contactEmail").value.trim();
    let message = document.getElementById("message").value.trim();

    let msg = document.getElementById("contactMsg");

    if(name === "" || email === "" || message === ""){
        msg.innerText = "All fields are required.";
        msg.style.color = "red";
        return;
    }

    msg.style.color = "green";
    msg.innerText = "Message sent successfully!";
});

</script>

<script>

const contactPage = document.querySelector(".contact-page");

const contactImages = [
   "images/hero1.jpg",
    "images/hero2.jpg",
    "images/hero3.jpg",
    "images/hero4.jpg"
];

function changeContactBg(){

    const randomIndex = Math.floor(Math.random() * contactImages.length);

    contactPage.style.backgroundImage =
    "linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(" + contactImages[randomIndex] + ")";
}

changeContactBg();

setInterval(changeContactBg, 7000);

</script>

</body>
</html>
