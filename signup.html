<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Fight Club Fitness</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="signup-page">

<!-- HEADER -->
<header>
    <div class="logo">
        <img src="images/logo.jpg" alt="Fight Club Fitness Logo">
        <span>Fight Club Fitness</span>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="signup.html">Register</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- HERO -->
<section class="sub-hero">
    <h1>Register Now</h1>
</section>

<!-- FORM -->

<img src="images/logo.jpg" alt="Logo" class="form-logo">

<section class="form-section">

    <form id="signupForm">

        <h2>Create Your Account</h2>

        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">

       <div class="services-select">
    <p>Select Services:</p>

    <label><input type="checkbox" name="services" value="Personal Training"> Personal Training</label>
    <label><input type="checkbox" name="services" value="Kickboxing"> Kickboxing</label>
    <label><input type="checkbox" name="services" value="Karate"> Karate</label>
    <label><input type="checkbox" name="services" value="Online Coaching"> Online Coaching</label>
</div>

        <button type="submit" class="join-btn">Register</button>

        <p id="errorMsg"></p>

    </form>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Fight Club Fitness Studio</p>
</footer>

<script>

/* FORM VALIDATION */

document.getElementById("signupForm").addEventListener("submit", function(e){

    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let services = document.querySelectorAll('input[name="services"]:checked');
    let errorMsg = document.getElementById("errorMsg");

if(name === "" || email === "" || password === "" || confirmPassword === "" || services.length === 0){        errorMsg.innerText = "All fields are required.";
        errorMsg.style.color = "red";
        return;
    }

    if(password.length < 6){
        errorMsg.innerText = "Password must be at least 6 characters.";
        return;
    }

    if(password !== confirmPassword){
        errorMsg.innerText = "Passwords do not match.";
        return;
    }

    let selectedServices = [];
services.forEach(service => selectedServices.push(service.value));

console.log("Selected:", selectedServices);let selectedServices = [];
services.forEach(service => selectedServices.push(service.value));

console.log("Selected:", selectedServices);

    errorMsg.style.color = "green";
errorMsg.innerText = "Registration successful!";

/* delay reset so user sees message */
setTimeout(() => {
    document.getElementById("signupForm").reset();
}, 2000);

</script>

<script>

const signupPage = document.querySelector(".signup-page");

const signupImages = [
    "images/hero1.jpg",
    "images/hero2.jpg",
    "images/hero3.jpg",
    "images/hero4.jpg"
];

function changeSignupBg(){

    const randomIndex = Math.floor(Math.random() * signupImages.length);

    signupPage.style.backgroundImage =
    "linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(" + signupImages[randomIndex] + ")";
}

changeSignupBg();

setInterval(changeSignupBg, 3000);

</script>

</body>
</html>
